<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>UCA - Facultés</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo-container">
            <img src="images.jpg" alt="UCA Logo" class="logo-img">
            <span class="logo-text">Université Cadi Ayyad</span>
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="faculties.html">Facultés</a></li>
            <li><a href="admission.html">Admission</a></li>
            <li><a href="info.html">Infos</a></li>
        </ul>
    </nav>
</header>

<section class="faculties">
    <div class="cover">
        <div class="content">
            <h1>Nos Facultés</h1>
            <div class="line"></div>
        </div>
    </div>

    <div class="cards">
        <div class="card" onclick="showFaculty('medecine')">
            <h3>Faculté de Médecine</h3>
        </div>

        <div class="card" onclick="showFaculty('science')">
            <h3>Faculté des Sciences</h3>
        </div>

        <div class="card" onclick="showFaculty('fst')">
            <h3>FST</h3>
        </div>

        <div class="card" onclick="showFaculty('ensa')">
            <h3>ENSA</h3>
        </div>
    </div>
</section>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modal-text"></div>
    </div>
</div>

<script>
const facultiesData = {

    medecine: `
        <h2>Faculté de Médecine</h2>
        <p>📍 Marrakech</p>
        <p>
        Faculté de Médecine et de Pharmacie de Marrakech, fondée en 1999.
        Elle forme des médecins et pharmaciens avec une formation théorique et pratique.
        </p>
    `,

    science: `
        <h2>Faculté des Sciences</h2>
        <p>📍 Marrakech</p>
        <p>🎓 Filières: Maths, Physique, Informatique</p>
        <p>
        Faculté des Sciences Semlalia, fondée en 1978.
        Formation en licence, master et doctorat.
        </p>
    `,

    ensa: `
        <h2>ENSA Marrakech</h2>
        <p>🎓 Génie Informatique, Réseaux, Industriel</p>
        <p>
        École d'ingénieurs créée en 2000.
        Formation d'ingénieurs d'État en 5 ans.
        </p>
    `,

    fst: `
        <h2>FST Marrakech</h2>
        <p>🎓 Sciences et Techniques</p>
        <p>
        Créée en 1993.
        Formation en ingénierie, licence, master et doctorat.
        </p>
    `
};

function showFaculty(faculty) {
    document.getElementById("modal-text").innerHTML = facultiesData[faculty];
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

window.onclick = function(event) {
    let modal = document.getElementById("modal");
    if (event.target === modal) {
        modal.style.display = "none";
    }
}
</script>
</body>
</html>
